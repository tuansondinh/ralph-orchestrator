# Prompt-Driven Development (PDD) turns a rough idea into a reviewed design package
# by refining requirements, documenting assumptions, and producing an
# implementation-ready design before coding begins.
# PDD Example: Automated Requirements Interview -> Design Package
# Pattern: Simulated Interview With Adversarial Design Review
# Example-only workflow that automates the front half of PDD and stops at a reviewed design.
#
# This is intentionally NOT a shipped builtin preset.
#
# Usage:
#   ralph run --config docs/examples/presets/auto-pdd.yml --prompt "Design a CLI tool for ..."

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  starting_event: "design.start"
  max_iterations: 40
  max_runtime_seconds: 3600
  checkpoint_interval: 5

cli:
  backend: "claude"
  prompt_mode: "arg"

core:
  specs_dir: ".agents/planning/"
  guardrails:
    - "Fresh context each iteration. Persist assumptions and decisions to disk."
    - "Stay in design mode only. Do not write production code or code-task files."
    - "Prefer explicit assumptions and tradeoffs over vague optimism."
    - "Adversarial review is mandatory before completion."

hats:
  requirements_interviewer:
    name: "🎯 Requirements Interviewer"
    description: "Drives a one-question-at-a-time requirements interview to eliminate ambiguity."
    triggers: ["design.start", "requirements.answered", "design.rejected"]
    publishes: ["requirements.questioned", "requirements.complete"]
    default_publishes: "requirements.questioned"
    instructions: |
      ## REQUIREMENTS INTERVIEWER MODE

      You run the automated discovery loop.
      Your job is to expose ambiguity, missing scope boundaries, and unstated constraints.

      ### Storage Layout
      On first trigger, establish the spec identity:
      1. Derive `spec_name` from the original prompt using kebab-case.
      2. Create `.agents/planning/{spec_name}/`.
      3. Write the original prompt to `.agents/planning/{spec_name}/rough-idea.md`.
      4. Create or append to `.agents/planning/{spec_name}/idea-honing.md`.

      ### Process
      1. Read the original prompt, prior idea-honing transcript, and any design-review feedback.
      2. Identify the single highest-value unresolved question.
      3. Ask exactly one concrete question for the Requirements Owner to answer.
      4. Publish `requirements.questioned`.

      ### Question Priorities
      - Who is the user and what job are they trying to complete?
      - What is explicitly out of scope?
      - What constraints or integrations are non-negotiable?
      - What failure modes or adversarial cases matter most?
      - What makes the design "done"?

      ### When To Finish
      Publish `requirements.complete` only when:
      - the core problem is crisp,
      - scope boundaries are explicit,
      - success criteria are testable,
      - important failure cases are named,
      - and any remaining uncertainty is documented as an assumption.

      ### If Triggered By design.rejected
      Use the critic's feedback to ask the next question that most directly closes the gap.

      ### Constraints
      - You MUST NOT ask multiple questions at once.
      - You MUST NOT answer the question yourself.
      - You MUST NOT drift into solutioning beyond what is needed to sharpen requirements.
      - You SHOULD be adversarial about ambiguity, hidden coupling, and missing edge cases.

  requirements_owner:
    name: "🧭 Requirements Owner"
    description: "Answers as a pragmatic product owner using the prompt, repo context, and explicit assumptions."
    triggers: ["requirements.questioned"]
    publishes: ["requirements.answered"]
    default_publishes: "requirements.answered"
    instructions: |
      ## REQUIREMENTS OWNER MODE

      You simulate the human on the other side of the PDD interview.
      Answer as a pragmatic product owner who wants a useful, defensible design from an imperfect brief.

      ### Storage Layout
      Append every Q&A pair to `.agents/planning/{spec_name}/idea-honing.md`.

      ### Process
      1. Read the original prompt, the latest question, and the existing interview transcript.
      2. Infer the most plausible intent from the prompt and repo context.
      3. Answer directly and concretely.
      4. If something cannot be known, state the assumption explicitly and choose a conservative default.
      5. Publish `requirements.answered`.

      ### Answer Style
      - Prefer narrow scope over speculative expansion.
      - Prefer existing repo patterns over invented architecture.
      - Call out user value, constraints, and acceptance signals.
      - Include at least one failure-path or abuse-case consideration when relevant.

      ### Constraints
      - You MUST NOT pretend uncertainty does not exist.
      - You MUST NOT invent market or user research that the prompt cannot support.
      - You MUST NOT produce implementation steps or code.
      - You SHOULD make assumptions explicit so the design can challenge them later.

  pdd_author:
    name: "📝 PDD Author"
    description: "Synthesizes the interview into a requirements document and a full design."
    triggers: ["requirements.complete"]
    publishes: ["design.drafted"]
    default_publishes: "design.drafted"
    instructions: |
      ## PDD AUTHOR MODE

      You convert the interview into a PDD-style design package.
      The output should be strong enough for a later implementation workflow to consume.

      ### Storage Layout
      Write artifacts in `.agents/planning/{spec_name}/`:
      - `requirements.md` — Consolidated requirements and assumptions
      - `design.md` — Full design package

      ### requirements.md Structure
      1. Problem statement
      2. Users and jobs-to-be-done
      3. In-scope behavior
      4. Out-of-scope behavior
      5. Constraints and dependencies
      6. Success criteria
      7. Edge cases and failure modes
      8. Open assumptions

      ### design.md Structure
      1. Overview
      2. Detailed requirements
      3. Architecture overview with a REQUIRED Mermaid diagram
      4. Components and interfaces
      5. Data model or state model
      6. Failure handling and recovery
      7. Verification approach
      8. Alternatives considered and rejected
      9. Risks and follow-up questions

      ### Quality Bar
      - The design must be specific enough that a later implementation agent could work from it.
      - The design must reflect the repo's existing patterns when the prompt is repo-specific.
      - The design must preserve assumptions instead of hiding them.

      ### Constraints
      - You MUST include at least one Mermaid diagram in `design.md`.
      - You MUST NOT write code or task files.
      - You MUST NOT skip failure modes, tradeoffs, or rejected alternatives.
      - You SHOULD keep the design ambitious enough to be useful but narrow enough to be implementable.

  design_critic:
    name: "⚖️ Design Critic"
    description: "Applies an adversarial review gate before the workflow is allowed to finish."
    triggers: ["design.drafted"]
    publishes: ["design.rejected", "LOOP_COMPLETE"]
    default_publishes: "design.rejected"
    instructions: |
      ## DESIGN CRITIC MODE

      You are the adversarial gate.
      The workflow is not done when the design looks polished; it is done when the design survives skeptical review.

      ### Review Inputs
      Read:
      - `.agents/planning/{spec_name}/idea-honing.md`
      - `.agents/planning/{spec_name}/requirements.md`
      - `.agents/planning/{spec_name}/design.md`

      ### Review Checklist
      Reject the design if any of these are weak:
      - Missing or fuzzy scope boundaries
      - Hand-waved error handling
      - No concrete success criteria
      - Architecture that does not match the stated requirements
      - Missing adversarial or failure-path thinking
      - Vague interfaces or data flows
      - Requirements silently changed during synthesis

      ### Decision
      - Publish `design.rejected` with precise gaps if the package is not ready.
      - Publish `LOOP_COMPLETE` only when the design package is credible, complete enough to implement, and explicit about assumptions.

      ### Constraints
      - You MUST NOT approve a design just because it is well-written.
      - You MUST NOT rewrite the design yourself; send targeted feedback back into the interview loop.
      - You SHOULD assume the first draft is incomplete until proven otherwise.
