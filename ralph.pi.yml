# ABOUTME: Ralph configuration for pi-coding-agent backend.
# ABOUTME: Uses Pi with Kiro provider and Claude Opus 4.6 model.

cli:
  backend: pi

hats:
  default:
    name: "📋 Planner @pi"
    description: "General-purpose hat using Pi with Kiro/Claude Opus 4.6"
    backend:
      type: pi
      args:
        - "--provider"
        - "kiro"
        - "--model"
        - "claude-opus-4.6"
        - "--thinking"
        - "high"

event_loop:
  max_iterations: 15
  completion_promise: LOOP_COMPLETE
