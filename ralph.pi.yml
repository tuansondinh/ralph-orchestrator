# ABOUTME: Ralph configuration for pi-coding-agent backend.
# ABOUTME: Uses Pi with OpenAI Codex provider for orchestration loops.

cli:
  backend: pi

hats:
  default:
    name: "🔎 Change Scoper @pi"
    description: "Scopes and implements changes using Pi"
    triggers: ["work.start"]
    publishes: ["LOOP_COMPLETE"]
    default_publishes: "LOOP_COMPLETE"
    backend:
      type: pi
      args:
        - "--provider"
        - "kiro"
        - "--model"
        - "claude-opus-4.6"
        - "--thinking"
        - "high"

event_loop:
  max_iterations: 15
  completion_promise: LOOP_COMPLETE
